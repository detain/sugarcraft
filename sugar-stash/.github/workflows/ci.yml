name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  PHP_EXTENSIONS: mbstring, intl, json, pcntl, sqlite3, pdo_sqlite, pdo_mysql, pdo_pgsql, ssh2, gd, curl, openssl, ffi
  COMPOSER_ROOT_VERSION: dev-master

jobs:
  test:
    name: 'Test · PHP 8.3'
    runs-on: ubuntu-latest
    concurrency:
      group: ci-test-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v5

      - name: Compute PHP-extension cache key
        id: ext-cache
        uses: shivammathur/cache-extensions@v1
        with:
          php-version: '8.3'
          extensions: ${{ env.PHP_EXTENSIONS }}
          key: php-ext-v4

      - name: Restore PHP extensions
        uses: actions/cache@v5
        with:
          path: ${{ steps.ext-cache.outputs.dir }}
          key: ${{ steps.ext-cache.outputs.key }}
          restore-keys: ${{ steps.ext-cache.outputs.key }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: ${{ env.PHP_EXTENSIONS }}
          tools: composer:v2
          coverage: none

      - name: Get composer cache dir
        id: cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer downloads
        uses: actions/cache@v5
        with:
          path: ${{ steps.cache.outputs.dir }}
          key: composer-8.3-${{ hashFiles('sugar-stash/composer.json') }}
          restore-keys: |
            composer-8.3-

      - name: Cache vendor/
        uses: actions/cache@v5
        with:
          path: sugar-stash/vendor
          key: vendor-v3-8.3-sugar-stash-${{ hashFiles('sugar-stash/composer.json') }}
          restore-keys: |
            vendor-v3-8.3-sugar-stash-

      - name: Install dependencies
        run: cd sugar-stash && composer install --prefer-dist --no-progress -n

      - name: Run tests
        run: php sugar-stash/vendor/bin/phpunit -c sugar-stash/phpunit.xml --colors=never

  coverage:
    name: 'Coverage'
    runs-on: ubuntu-latest
    needs: [test]
    concurrency:
      group: ci-coverage-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v5

      - name: Compute PHP-extension cache key
        id: ext-cache
        uses: shivammathur/cache-extensions@v1
        with:
          php-version: '8.3'
          extensions: ${{ env.PHP_EXTENSIONS }}
          key: php-ext-cov-v4

      - name: Restore PHP extensions
        uses: actions/cache@v5
        with:
          path: ${{ steps.ext-cache.outputs.dir }}
          key: ${{ steps.ext-cache.outputs.key }}
          restore-keys: ${{ steps.ext-cache.outputs.key }}

      - name: Setup PHP (with pcov)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: ${{ env.PHP_EXTENSIONS }}
          tools: composer:v2
          coverage: pcov

      - name: Cache composer downloads
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: composer-cov-${{ hashFiles('sugar-stash/composer.json') }}
          restore-keys: |
            composer-cov-

      - name: Cache vendor/
        uses: actions/cache@v5
        with:
          path: sugar-stash/vendor
          key: vendor-cov-v4-sugar-stash-${{ hashFiles('sugar-stash/composer.json') }}
          restore-keys: |
            vendor-cov-v4-sugar-stash-

      - name: Install dependencies
        run: |
          set -e
          cd sugar-stash && composer install --prefer-dist --no-progress -n

      - name: Run tests with coverage
        run: php sugar-stash/vendor/bin/phpunit -c sugar-stash/phpunit.xml --colors=never --coverage-clover=sugar-stash/coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          slug: detain/sugarcraft
          files: sugar-stash/coverage.xml
          disable_search: true
          flags: sugar-stash
          name: sugar-stash
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true
